name: Update Live Playlist

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'models.txt'

concurrency:
  group: playlist-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome manually
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests selenium webdriver-manager

      - name: Run playlist updater
        run: python update_playlist.py
        timeout-minutes: 25

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "🔄 Update playlist — $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
